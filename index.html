<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>ルルイエ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      background: #020403;
      color: #cfd8c3;
      font-family: "Yu Mincho", serif;
      transition: background 0.5s;
    }

    header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #133;
    }

    #board {
      height: 520px;
      overflow-y: auto;
      border: 1px solid #233;
      padding: 10px;
      margin: 30px;
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.5);
    }

    .post {
      border-bottom: 1px dashed #244;
      padding: 12px 0;
    }

    .time {
      font-size: 11px;
      opacity: 0.6;
    }

    #form {
      max-width: 800px;
      margin: 24px auto;
      padding: 16px;
      border: 1px solid #133;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #000;
      color: #cfd8c3;
      border: 1px solid #244;
    }

    button {
      margin-top: 8px;
      background: #021;
      color: #cfd8c3;
      border: 1px solid #355;
      padding: 6px 12px;
    }

    /* ノイズ */
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="200" height="200" filter="url(%23n)"/></svg>');
    }

    .crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, rgba(0, 0, 0, 0.06) 2px);
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .crt.active {
      opacity: 1;
    }

    /* ========== 異常イベント CSS ========== */

    /* 赤転 */
    body.anomaly-red::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(180, 0, 0, 0.55);
      z-index: 9998;
      pointer-events: none;
    }

    /* 揺れ */
    body.anomaly-shake {
      animation: screenShake 0.1s infinite;
    }

    /* CRT走査線 */
    body.anomaly-crt::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 0px, rgba(255, 255, 255, 0.04) 1px, rgba(0, 0, 0, 0) 2px, rgba(0, 0, 0, 0) 4px);
      z-index: 9999;
      pointer-events: none;
      animation: scanline 0.15s linear infinite;
    }

    /* 全部盛り（レア） */
    body.anomaly-full {
      animation: screenShake 0.08s infinite;
      filter: contrast(200%) saturate(300%);
    }

    body.anomaly-full::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(200, 0, 0, 0.7);
      z-index: 9998;
    }

    body.anomaly-full::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 0px, rgba(255, 255, 255, 0.05) 1px, rgba(0, 0, 0, 0) 2px, rgba(0, 0, 0, 0) 4px);
      z-index: 9999;
    }

    /* ---- 新イベント ---- */

    /* 画面反転 */
    body.anomaly-invert {
      filter: invert(1) hue-rotate(180deg);
      transition: filter 0.3s;
    }

    /* タイポグラフィ崩壊 */
    body.anomaly-font * {
      font-family: monospace !important;
      letter-spacing: 0.4em !important;
      word-spacing: 1em !important;
    }

    body.anomaly-font #board {
      transform: skewX(-3deg);
    }

    /* 緑リン光（幽霊色） */
    body.anomaly-ghost::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 255, 100, 0.08);
      z-index: 9998;
      pointer-events: none;
      animation: ghostPulse 0.8s ease-in-out infinite alternate;
    }

    body.anomaly-ghost {
      filter: hue-rotate(100deg) brightness(0.7);
    }

    @keyframes ghostPulse {
      from {
        opacity: 0.3;
      }

      to {
        opacity: 1;
      }
    }

    /* 意識喪失フェード */
    body.anomaly-faint::after {
      content: '';
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      pointer-events: none;
      animation: faintIn 3s ease forwards;
    }

    @keyframes faintIn {
      0% {
        opacity: 0;
      }

      60% {
        opacity: 0.95;
      }

      100% {
        opacity: 0;
      }
    }

    /* 血のにじみ */
    body.anomaly-blood::before {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(160, 0, 0, 0.85) 0%, transparent 100%);
      z-index: 9998;
      pointer-events: none;
      animation: bloodRise 2s ease-out forwards;
    }

    @keyframes bloodRise {
      from {
        height: 0;
        opacity: 0;
      }

      to {
        height: 45%;
        opacity: 1;
      }
    }

    /* ノイズ嵐 */
    body.anomaly-noise .noise {
      opacity: 0.7 !important;
      animation: noiseFlicker 0.05s infinite;
    }

    @keyframes noiseFlicker {
      0% {
        opacity: 0.4
      }

      50% {
        opacity: 0.9
      }

      100% {
        opacity: 0.5
      }
    }

    /* 静電気フラッシュ */
    body.anomaly-flash::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      pointer-events: none;
      animation: flashBurst 0.6s steps(1, end) infinite;
    }

    @keyframes flashBurst {
      0% {
        opacity: 0.9;
      }

      10% {
        opacity: 0;
      }

      30% {
        opacity: 0.7;
      }

      50% {
        opacity: 0;
      }

      70% {
        opacity: 0.5;
      }

      100% {
        opacity: 0;
      }
    }

    /* 縦ズレ（グリッチ） */
    body.anomaly-glitch {
      animation: glitchSlip 0.3s infinite;
    }

    @keyframes glitchSlip {
      0% {
        clip-path: inset(0 0 95% 0);
        transform: translate(-5px, 0);
      }

      20% {
        clip-path: inset(20% 0 60% 0);
        transform: translate(5px, 0);
      }

      40% {
        clip-path: inset(50% 0 30% 0);
        transform: translate(-3px, 2px);
      }

      60% {
        clip-path: inset(0 0 0 0);
        transform: translate(0, 0);
      }

      80% {
        clip-path: inset(80% 0 5% 0);
        transform: translate(3px, -2px);
      }

      100% {
        clip-path: inset(0 0 0 0);
        transform: translate(0, 0);
      }
    }

    /* 眼（中央に目が現れる） */
    #eye-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      align-items: center;
      justify-content: center;
    }

    #eye-overlay.show {
      display: flex;
    }

    #eye-svg {
      animation: eyeBlink 3s ease-in-out;
    }

    @keyframes eyeBlink {
      0% {
        opacity: 0;
        transform: scale(0.1);
      }

      20% {
        opacity: 1;
        transform: scale(1.1);
      }

      50% {
        opacity: 0.95;
        transform: scale(1);
      }

      80% {
        opacity: 1;
        transform: scale(1.05);
      }

      100% {
        opacity: 0;
        transform: scale(0.1);
      }
    }

    /* 文字化けオーバーレイ */
    #glitch-text {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
      font-size: 2rem;
      color: #8f0;
      font-family: monospace;
      text-shadow: 0 0 8px #0f0;
      pointer-events: none;
      white-space: nowrap;
      animation: textFlicker 0.1s infinite;
    }

    #glitch-text.show {
      display: block;
    }

    @keyframes textFlicker {
      0% {
        opacity: 1
      }

      50% {
        opacity: 0.6
      }

      100% {
        opacity: 1
      }
    }

    /* ========== 共通アニメーション ========== */
    @keyframes screenShake {
      0% {
        transform: translate(0, 0)
      }

      25% {
        transform: translate(2px, -2px)
      }

      50% {
        transform: translate(-2px, 2px)
      }

      75% {
        transform: translate(2px, 2px)
      }

      100% {
        transform: translate(0, 0)
      }
    }

    @keyframes scanline {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 0 4px;
      }
    }
  </style>
</head>

  <script>
    // 右クリック禁止
    document.addEventListener('contextmenu', e => e.preventDefault());

    /* Firebase設定 */
    const firebaseConfig = {
      apiKey: "AIzaSyC1IK8k7yfu7rEzGBsQHl9CLHLy1aCwYTE",
      authDomain: "rlyeh-board.firebaseapp.com",

    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const postsRef = db.ref('posts');
    const board = document.getElementById('board');

    function addPost(text) {
      const div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = `<div>${text}</div>`;
      board.prepend(div);
    }

    function sendPost() {
      const input = document.getElementById('input');
      if (!input.value.trim()) return;
      postsRef.push({ text: input.value });
      localStorage.setItem('rlyeh_marked', 'true');
      input.value = '';

    // リアルタイム受信
    postsRef.limitToLast(30).on('child_added', snapshot => {

      addPost(data.text);

    // ==============================

    const autoPosts = [

      '吉田悠斗', '山田奈々', '佐々木亮', '山口愛', '松本大輔', '井上里奈', '木村拓也', '林優子', '清水航', '斎藤恵',
      '森田剛', '池田美優', '橋本涼', '阿部真琴', '石川俊介', '前田由紀', '藤田健太', '小川沙織', '岡田悠', '後藤理沙',
      '長谷川修', '村上葵', '近藤達也', '石井彩乃', '坂本隆', '遠藤美香', '青木亮介', '藤井千尋', '西村直人', '福田麻衣',
      '太田和也', '三浦結衣', '岡本祐介', '中島梨花', '藤原聡', '金子沙奈', '小野大地', '宮崎彩', '内田慎吾', '横山由佳',
      '一索 光里', '狐西 贋', '蛇亀 守', '蝶野 友人', '馬乗 力也', '避役 彩羽', '本渡坊薫', '谷本大和', '佐藤隆之介',
      '頭に回線通ってないだろ', '脳みそが常時エラーなやつ', '思考力が化石', '存在がノイズ', 'TLの汚染源',
      '発言が全部的外れ', '何一つ理解してない', '会話する価値がない', '知能が足りてない', '脳内お花畑',
      '妄想で生きてる', '都合のいい世界線', '自分が正しい前提', '勘違いが重症', '救いようがない',
      '黙ってた方がマシ', '発言が害', '存在が迷惑', '空気を腐らせる', '場を壊す才能しかない',
      '承認欲求の塊', '必死すぎて見苦しい', '痛々しい', '見てて恥ずかしい', 'センスが死んでる',
      '論理破綻してる', '日本語不自由', '読解力皆無', '話が通じない', '自己中の極み',
      '中身が伴ってない', '実力皆無', '口だけ達者', '行動ゼロ', '結果ゼロ', '価値ゼロ',
      '人が離れる理由', '孤立製造機', '炎上請負人', '界隈の癌', '関わったら負け',
      '見なかったことにしたい', '記憶から消したい', '学習能力ゼロ', '反省皆無', '謝る気ゼロ',
      '言い訳の天才', '責任転嫁職人', '逆ギレ標準装備', '豆腐メンタル', '負け犬ムーブ',
      '妄言垂れ流し', '正論の皮を被ったゴミ', '何様なのか不明', '身の程知らず',
      '邪魔でしかない', '雰囲気破壊装置', '人を不快にする才能', '好かれる要素ゼロ',
      '害悪', '中身スカスカ', '虚無製造', '無意味な存在', 'もう無理', '救済不可', '終わってる', '死ね', 'ブス',
      '障害', '無能', '無価値', '無意味', '無知', '愚か者', '老害', 'ゴミ', '臭い', 'クズ', 'カス', 'バカ', 'アホ',
      '狼少年', '嘘つき', '裏切り者', '詐欺師', '変態', 'サイコパス', 'キモオタ', '犯罪者だろｗ', 'それわかるわ', 'むしろいない方が平和',
    ];
    setInterval(() => {
      postsRef.push({ text: autoPosts[Math.floor(Math.random() * autoPosts.length)] });
    }, 120000);

    // ==============================
    // オーディオ
    // ==============================
    let audioCtx = null;
    document.body.addEventListener('click', () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // 深海低音 ドローン
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 40;
        gain.gain.value = 0.06;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
      }
    }, { once: true });

    const anomalySounds = [
      '恐怖.mp3', 'うなり.mp3', 'クトゥルフ・フタグン.mp3', 'ゴゴゴゴ.mp3',
      '恐怖(10)万能.mp3', '地震魔法1.mp3', 'caroloftheoldones2.wav',
      '恐怖(30)ゾーンタイム2.wav', '深海.mp3'
    ];

    function playAnomalySound() {
      const src = anomalySounds[Math.floor(Math.random() * anomalySounds.length)];
      const s = new Audio(src);
      s.volume = 0.4;
      s.play().catch(() => { });
      return s;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.15) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      setTimeout(() => { gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5); osc.stop(audioCtx.currentTime + 0.6); }, duration);
    }

    // ==============================
    // イベント: クラス系（タイムアウト解除）
    // ==============================
    function applyClass(cls, duration) {
      document.body.classList.add(cls);
      return setTimeout(() => document.body.classList.remove(cls), duration);
    }

    // ==============================
    // 文字化けイベント
    // ==============================
    const glitchChars = 'ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍΨΩФΛΞiλωαβγδεζηθΩ가나다라마바사아자차카타파하∆∇∫∑√∞≈≠≡±×÷¿¡░▒▓█▄▀■□▪▫▬';
    function randomGlitchStr(len) {
      let s = '';
      for (let i = 0; i < len; i++) s += glitchChars[Math.floor(Math.random() * glitchChars.length)];
      return s;
    }
    function glitchTextEvent(duration = 5000) {
      const el = document.getElementById('glitch-text');
      el.classList.add('show');
      const iv = setInterval(() => { el.textContent = randomGlitchStr(18 + Math.floor(Math.random() * 14)); }, 80);
      setTimeout(() => { clearInterval(iv); el.classList.remove('show'); el.textContent = ''; }, duration);
      playTone(660, duration, 'sawtooth', 0.08);
    }

    // ==============================
    // 眼イベント
    // ==============================
    function eyeEvent(duration = 4000) {
      const overlay = document.getElementById('eye-overlay');
      overlay.classList.add('show');
      // 微妙に動く
      const svg = document.getElementById('eye-svg');
      const iv = setInterval(() => {
        const dx = (Math.random() - 0.5) * 20, dy = (Math.random() - 0.5) * 10;
        svg.style.transform = `translate(${dx}px,${dy}px)`;
      }, 300);
      setTimeout(() => { overlay.classList.remove('show'); clearInterval(iv); svg.style.transform = ''; }, duration);
      playTone(55, duration, 'sine', 0.2);
    }

    // ==============================
    // 血のにじみイベント
    // ==============================
    function bloodEvent(duration = 6000) {
      applyClass('anomaly-blood', duration);
      playTone(80, duration, 'sawtooth', 0.12);
    }

    // ==============================
    // 意識喪失フェードイベント
    // ==============================
    function faintEvent(duration = 5000) {
      applyClass('anomaly-faint', duration);
      playTone(30, duration, 'sine', 0.18);
    }

    // ==============================
    // 反転イベント
    // ==============================
    function invertEvent(duration = 4000) {
      applyClass('anomaly-invert', duration);
      playTone(440, 500, 'square', 0.1);
    }

    // ==============================
    // タイポグラフィ崩壊イベント
    // ==============================
    function fontGlitchEvent(duration = 5000) {
      applyClass('anomaly-font', duration);
      playTone(220, duration, 'triangle', 0.07);
    }

    // ==============================
    // 幽霊色イベント
    // ==============================
    function ghostEvent(duration = 7000) {
      applyClass('anomaly-ghost', duration);
      const crt = document.getElementById('crt');
      crt.classList.add('active');
      setTimeout(() => crt.classList.remove('active'), duration);
      playTone(110, duration, 'sine', 0.15);
    }

    // ==============================
    // 静電気フラッシュイベント
    // ==============================
    function flashEvent(duration = 2000) {
      applyClass('anomaly-flash', duration);
      playTone(1200, 300, 'square', 0.2);
    }

    // ==============================
    // グリッチスリップイベント
    // ==============================
    function glitchSlipEvent(duration = 3000) {
      applyClass('anomaly-glitch', duration);
      playTone(800, duration, 'sawtooth', 0.1);
    }

    // ==============================
    // ノイズ嵐イベント
    // ==============================
    function noiseStormEvent(duration = 8000) {
      applyClass('anomaly-noise', duration);
      playTone(60, duration, 'sawtooth', 0.1);
    }

    // ==============================
    // 赤転イベント
    // ==============================
    function redEvent(duration = 6000) {
      applyClass('anomaly-red', duration);
      const s = playAnomalySound();
      setTimeout(() => { s.pause(); s.currentTime = 0; }, duration);
    }

    // ==============================
    // 揺れ＋走査線イベント
    // ==============================
    function shakeCrtEvent(duration = 5000) {
      applyClass('anomaly-shake', duration);
      applyClass('anomaly-crt', duration);
      const s = playAnomalySound();
      setTimeout(() => { s.pause(); s.currentTime = 0; }, duration);
    }

    // ==============================
    // 全部盛り（レアイベント）
    // ==============================
    function fullAnomalyEvent(duration = 8000) {
      applyClass('anomaly-full', duration);
      document.getElementById('crt').classList.add('active');
      const s = playAnomalySound();
      setTimeout(() => {
        document.getElementById('crt').classList.remove('active');
        s.pause(); s.currentTime = 0;
      }, duration);
    }

    // ==============================
    // イベントテーブル（重み付き）
    // ==============================
    const eventTable = [
      // [関数, 基本持続ms, 重み]
      { fn: () => glitchTextEvent(5000), weight: 15 }, // 文字化けテキスト
      { fn: () => eyeEvent(4500), weight: 10 }, // 眼
      { fn: () => bloodEvent(6000), weight: 12 }, // 血のにじみ
      { fn: () => faintEvent(5000), weight: 10 }, // 意識喪失
      { fn: () => invertEvent(4000), weight: 12 }, // 画面反転
      { fn: () => fontGlitchEvent(5000), weight: 10 }, // タイポグラフィ崩壊
      { fn: () => ghostEvent(7000), weight: 8 }, // 幽霊色
      { fn: () => flashEvent(2000), weight: 13 }, // 静電気フラッシュ
      { fn: () => glitchSlipEvent(3000), weight: 12 }, // グリッチスリップ
      { fn: () => noiseStormEvent(8000), weight: 8 }, // ノイズ嵐
      { fn: () => redEvent(6000), weight: 12 }, // 赤転
      { fn: () => shakeCrtEvent(5000), weight: 12 }, // 揺れ+CRT
      { fn: () => fullAnomalyEvent(8000), weight: 2 }, // 全部盛り（レア）
    ];

    // 重み付き抽選
    function pickEvent() {
      const total = eventTable.reduce((s, e) => s + e.weight, 0);
      let r = Math.random() * total;
      for (const e of eventTable) {
        r -= e.weight;
        if (r <= 0) return e.fn;
      }
      return eventTable[0].fn;
    }

    // ==============================
    // スケジューラ（3〜7分ランダム）
    // ==============================
    function scheduleEvent() {
      const next = 180000 + Math.random() * 240000; // 3〜7分
      setTimeout(() => {
        pickEvent()();
        scheduleEvent();
      }, next);
    }
    scheduleEvent();

    // ==============================
    // 90秒ごとにも軽微なイベント（40%確率）
    // ==============================
    const lightEvents = [
      () => flashEvent(1500),
      () => invertEvent(2000),
      () => glitchSlipEvent(2000),
      () => glitchTextEvent(3000),
      () => shakeCrtEvent(3000),
    ];
    setInterval(() => {
      if (Math.random() < 0.4) {
        lightEvents[Math.floor(Math.random() * lightEvents.length)]();
      }
    }, 90000);

  </script>
